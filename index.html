<!DOCTYPE html>
<html>
<head>
<title>FM 59.9 Latinos</title>
<meta charset="UTF-8">

<style>

body{
background: linear-gradient(180deg,#050505,#0a0a12,#000000);
color:white;
text-align:center;
font-family:Arial;
margin:0;
padding:0;
}

.logo{
margin-top:80px;
width:520px;
filter: drop-shadow(0 0 15px #ff4b2b);
}

.radio-title{
font-size:26px;
letter-spacing:6px;
margin-top:25px;
color:#ccc;
}

.play-btn{
margin-top:40px;
font-size:20px;
padding:14px 40px;
background:transparent;
border:2px solid #ff4b2b;
border-radius:6px;
color:white;
cursor:pointer;
transition:0.3s;
}

.play-btn:hover{
background:#ff4b2b;
box-shadow:0 0 15px #ff4b2b;
}

.footer{
margin-top:80px;
color:#777;
font-size:14px;
}

</style>

</head>

<body>

<img src="fm 59.9 latinos.png" class="logo">

<div class="radio-title">RADIO EN VIVO</div>

<button class="play-btn">▶ ESCUCHAR</button>

<div class="footer">
FM 59.9 LATINOS — Música sin límites
</div>

</body>
</html>
