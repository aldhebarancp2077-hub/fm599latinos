<!DOCTYPE html>
<html>
<head>
<title>FM 59.9 Latinos</title>
<meta charset="UTF-8">

<style>
body{
background: radial-gradient(circle at center,#0a0014,#000000);
color:white;
text-align:center;
font-family:Arial;
margin:0;
padding:0;
}

.logo{
margin-top:60px;
width:600px;
filter: drop-shadow(0 0 20px #ff2bd6) drop-shadow(0 0 40px #00f7ff);
}

.radio-title{
font-size:28px;
letter-spacing:4px;
color:#00f7ff;
text-shadow:0 0 10px #00f7ff,0 0 20px #ff2bd6;
margin-top:20px;
}

.play-btn{
margin-top:40px;
font-size:22px;
padding:15px 40px;
background:#ff2bd6;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
box-shadow:0 0 15px #ff2bd6,0 0 30px #ff2bd6;
transition:0.3s;
}

.play-btn:hover{
background:#00f7ff;
box-shadow:0 0 20px #00f7ff,0 0 40px #00f7ff;
}

.footer{
margin-top:60px;
color:#aaa;
}
</style>
</head>

<body>

<img src="fm 59.9 latinos.png" class="logo">

<div class="radio-title">RADIO EN VIVO</div>

<button class="play-btn">▶ ESCUCHAR</button>

<div class="footer">
Próximamente chat, pedidos y app oficial.
</div>

</body>
</html>
