<!DOCTYPE html>
<html lang="es">
<head>
<title>FM 59.9 Latinos</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
    background: linear-gradient(180deg,#050505,#0a0a12,#000000);
    color: white;
    text-align: center;
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 20px 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: center;
}

.logo {
    width: 90%;
    max-width: 520px;
    filter: drop-shadow(0 0 15px #ff4b2b);
    margin-top: 20px;
    margin-bottom: 20px;
}

.radio-title {
    font-size: 26px;
    letter-spacing: 6px;
    color: #ccc;
    margin-bottom: 25px;
}

.play-btn {
    font-size: 20px;
    padding: 14px 40px;
    background: transparent;
    border: 2px solid #ff4b2b;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    transition: 0.3s;
    text-transform: uppercase;
    margin-bottom: 40px;
}

.play-btn:hover {
    background: #ff4b2b;
    box-shadow: 0 0 20px #ff4b2b;
}

/* Contenedor del Chat Minnit Reparado */
.chat-container {
    width: 95%;
    max-width: 500px;
    min-height: 500px;
    background: #000;
    border: 2px solid #ff4b2b;
    border-radius: 8px;
    box-shadow: 0 0 20px rgba(255, 75, 43, 0.3);
    margin-bottom: 20px;
    padding: 10px 0;
    overflow: hidden;
}

/* Ajuste para que el widget de Minnit no se salga del cuadro */
.minnit-chat-sembed {
    margin: 0 auto !important;
}

.footer {
    margin-top: 20px;
    color: #777;
    font-size: 14px;
}

#player {
    position: absolute;
    top: -9999px;
    left: -9999px;
}

.powered-by-minnit { display: none; } /* Ocultamos el link de texto para que quede más limpio */
</style>
</head>

<body>

<img src="fm 59.9 latinos.png" class="logo" alt="Logo FM 59.9">

<div class="radio-title">RADIO EN VIVO</div>

<button class="play-btn" id="ctrl-btn">▶ ESCUCHAR</button>

<div class="chat-container">
    <script src="https://minnit.chat/js/embed.js?c=1772345192" defer></script>
    <span style="display: none;" class="minnit-chat-sembed" 
          data-chatname="https://organizations.minnit.chat/167426399853754/c/Main?embed" 
          data-style="width:100%; height:500px;" 
          data-version="1.55">Chat</span>
</div>

<div id="player"></div>

<div class="footer">
FM 59.9 LATINOS — Música sin límites
</div>

<script>
  var player;
  var isPlaying = false;
  const btn = document.getElementById('ctrl-btn');

  var tag = document.createElement('script');
  tag.src = "https://www.youtube.com/iframe_api";
  var firstScriptTag = document.getElementsByTagName('script')[0];
  firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('player', {
      height: '0',
      width: '0',
      playerVars: {
        'listType': 'playlist',
        'list': 'PLe6c5G06CUoTXYz79PaJfvyiUlfnHJMsV',
        'loop': 1,
        'autoplay': 0
      },
      events: {
        'onReady': onPlayerReady,
        'onStateChange': onPlayerStateChange
      }
    });
  }

  function onPlayerReady(event) {
    btn.addEventListener('click', () => {
      if (!isPlaying) {
        player.setShuffle(true);
        var randomTrack = Math.floor(Math.random() * 80);
        player.playVideoAt(randomTrack);
        btn.textContent = '⏸ PAUSAR';
        isPlaying = true;
      } else {
        player.pauseVideo();
        btn.textContent = '▶ ESCUCHAR';
        isPlaying = false;
      }
    });
  }

  function onPlayerStateChange(event) {
    if (event.data === YT.PlayerState.ENDED) {
        var nextRandom = Math.floor(Math.random() * 80);
        player.playVideoAt(nextRandom);
    }
  }
</script>

</body>
</html>
